name: ci
on:
  # push only on main (post-merge); PR branches are covered by pull_request,
  # so a branch with an open PR runs CI once, not once per event
  push:
    branches: [main]
  pull_request:
# a newer push to the same ref cancels an in-flight run
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check agentfork tests
      - run: pytest -q
      - run: python demo/demo.py
        if: matrix.python-version == '3.10'
        timeout-minutes: 2
      - run: python -m agentfork.bench.kill_bench --cycles 50
        if: matrix.python-version == '3.10'
        timeout-minutes: 2
      - run: python -m agentfork.bench.crash_bench --cycles 10 --children 3
        if: matrix.python-version == '3.10'
        timeout-minutes: 2
      - run: python -m agentfork.bench.cost_model --children 10 --prefix 32000 --suffix 2000
        if: matrix.python-version == '3.10'
        timeout-minutes: 1

  sglang-patches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: sgl-project/sglang
          ref: 40517b593b23870cf351a05a1d53e930cea6a58d
          path: sglang
      - run: git -C sglang apply ../patches/0001-sglang-tree-radix-cache.patch
      - run: git -C sglang apply ../patches/0002-Wire-branch-lifecycle-through-the-SGLang-request-pat.patch
      - run: git -C sglang apply ../patches/0003-Harden-tree-request-auth-and-accounting.patch
      - run: python -m compileall -q sglang/python/sglang
